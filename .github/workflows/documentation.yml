name: Publish documentation.

on:
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # depth is needed for nbgv
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup versioning
      uses: dotnet/nbgv@master
      with:
        setAllVars: true

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build source generators for DocFX
      run: |
        dotnet build Trellis.Core/generator/Trellis.Core.Generator.csproj --no-restore -c Release
        dotnet build Trellis.Asp/generator/Trellis.AspSourceGenerator.csproj --no-restore -c Release
        dotnet build Trellis.EntityFrameworkCore/generator/Trellis.EntityFrameworkCore.Generator.csproj --no-restore -c Release

    - name: Build library projects to emit generator output for DocFX
      # docfx 2.x's bundled Roslyn cannot load our newer-compiler source generators
      # (FailedToLoadAnalyzer / ReferencesNewerCompiler), so any src project that derives a
      # type from `RequiredXxx<T>` (e.g. Trellis.Authorization's ActorId) would fail docfx's
      # source-parse with CS0311 because the generator-emitted partial is missing the
      # IScalarValue<TSelf,T> interface declaration. Those projects opt into
      # <EmitCompilerGeneratedFiles>true</EmitCompilerGeneratedFiles> +
      # <CompilerGeneratedFilesOutputPath>Generated</CompilerGeneratedFilesOutputPath> so the
      # generator's partial lands on disk during a real build, and docfx's metadata pass
      # opts back in to those on-disk files via the TrellisDocfxMetadataBuild property set in
      # docfx.json. This step does the "real build" so the on-disk files exist before docfx
      # runs in the next step.
      run: dotnet build --no-restore -c Release

    - name: Update doc tools
      run: dotnet tool update -g docfx

    - name: Gate stale v1 Error.X(...) factory references
      shell: bash
      run: |
        set -o pipefail
        # Catches stale v1-style references that a v2 user/AI could mistakenly copy.
        # Patterns:
        #   1. `Error.Validation(`, `Error.Domain(`, `Error.Failure(`  — names removed from the current API  v1-stale-ok
        #   2. `Error.<case>(`  not preceded on the same line by `new <whitespace> Error.` —
        #      case names that exist in v2 only via `new Error.<case>(...)` ctor.
        #      Case list mirrors the 20 sealed nested records in Trellis.Core/src/Errors/Error.cs.
        #      We grep all `Error.<case>(` then filter out lines containing `new<ws>Error.` so that
        #      multi-space (`new  Error.X`) and lookbehind-fragile cases are handled robustly.
        # Allowlist:
        #   - Historical files: MIGRATION_v3.md, CHANGELOG.md, docs/docfx_project/adr/**
        #   - Anti-pattern teaching: .github/copilot-instructions.md
        #   - Synthetic test stubs: Trellis.Analyzers/tests/**, Trellis.Asp/generator-tests/**
        #   - Per-line opt-out marker: append  v1-stale-ok  on the same line
        ALLOWLIST_RE='^(MIGRATION_v3\.md|CHANGELOG\.md|\.github/copilot-instructions\.md|docs/docfx_project/adr/|Trellis\.Analyzers/tests/|Trellis\.Asp/generator-tests/)'
        V2_CASES='BadRequest|Unauthorized|Forbidden|NotFound|MethodNotAllowed|NotAcceptable|Conflict|Gone|PreconditionFailed|ContentTooLarge|UnsupportedMediaType|RangeNotSatisfiable|UnprocessableContent|PreconditionRequired|TooManyRequests|InternalServerError|Unexpected|NotImplemented|ServiceUnavailable|Aggregate'
        HITS=$( {
          git grep -nE '\bError\.(Validation|Domain|Failure)\(' -- '*.cs' '*.md' || true;
          git grep -nE "\\bError\\.($V2_CASES)\\(" -- '*.cs' '*.md' \
            | grep -vE '\bnew[[:space:]]+Error\.' \
            || true;
        } | grep -v 'v1-stale-ok' \
          | grep -vE "$ALLOWLIST_RE" \
          || true)
        if [ -n "$HITS" ]; then
          echo "::error::Found stale v1 Error.X(...) factory references."
          echo "Use closed-ADT form: 'new Error.X(payload) { Detail = \"...\" }' or"
          echo "'Error.UnprocessableContent.ForField/ForRule(field, reasonCode, detail)'."
          echo "To intentionally allow a single line, append the marker:  v1-stale-ok"
          echo ""
          echo "$HITS"
          exit 1
        fi
        echo "No stale v1 Error.X factory references found."

    - name: Gate stale current-facing docs
      shell: pwsh
      run: ./docs/docfx_project/api_reference/audit-stale-docs.ps1

    - name: Build docs (warnings as errors)
      shell: bash
      run: |
        set -o pipefail
        # Capture full output so we can both display it and gate on it.
        docfx docs/docfx_project/docfx.json 2>&1 | tee docfx_output.log
        # FailedToLoadAnalyzer warnings are benign: docfx 2.x bundles an older
        # Roslyn than our source generators target (ReferencesNewerCompiler).
        # Source generators are not needed to extract XML doc metadata, so we
        # ignore those specific warnings. ALL other warnings fail the build.
        REMAINING=$(grep -E '^(warning|error|.*\.md\([0-9]+,[0-9]+\): warning)' docfx_output.log \
          | grep -v 'FailedToLoadAnalyzer' \
          || true)
        if [ -n "$REMAINING" ]; then
          echo "::error::docfx produced warnings/errors that are not on the known-benign list:"
          echo "$REMAINING"
          exit 1
        fi
        echo "docfx build clean (only known-benign FailedToLoadAnalyzer warnings, if any)."

    - name: Verify documentation build
      run: |
        if [ ! -d "docs/docfx_project/_site" ]; then
          echo "Documentation build failed - _site directory not found"
          exit 1
        fi
        echo "Documentation build successful"

    - name: Deploy to GitHub Pages
      # Branch guard: even though the workflow only runs on manual dispatch,
      # restrict deployment to dispatches from main so dispatching the workflow
      # against a topic branch never publishes that branch's _site to gh-pages.
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/docfx_project/_site
        force_orphan: true
