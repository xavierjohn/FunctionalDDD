name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main, release/v** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        
    - name: Setup versioning
      uses: dotnet/nbgv@master
      with:
        setAllVars: true

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test with Coverage
      # --coverage: Native .NET 10 coverage (requires Microsoft.Testing.Extensions.CodeCoverage)
      # --report-trx: Native MTP TRX generation (requires Microsoft.Testing.Extensions.TrxReport)
      run: |
        dotnet test --no-build -c Release 
        --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml
        --report-trx --results-directory ./TestResults

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          TestResults/**/*.trx

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        # MTP places coverage files within the results directory
        files: ./TestResults/**/*.cobertura.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

    - name: Update doc tools
      run: dotnet tool update -g docfx

    - name: Build docs
      run: docfx docs/docfx_project/docfx.json
  
    - name: Pack
      if: ${{ success() && !github.base_ref }}
      run: dotnet pack --no-build --verbosity normal -c Release -o artifacts/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: ${{ success() && !github.base_ref }}
      with:
        name: artifact
        path: artifacts/
