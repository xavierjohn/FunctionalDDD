name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # depth is needed for nbgv

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup versioning
      uses: dotnet/nbgv@master
      with:
        setAllVars: true

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
  
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release --filter-not-trait "Category=Integration"

    - name: Pack
      run: dotnet pack --no-build --configuration Release --output nupkgs --include-symbols

    - name: Install CycloneDX
      run: |
        dotnet tool install --global CycloneDX --version 6.0.0
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Generate SBOMs
      shell: pwsh
      run: |
        $packagesDirectory = Join-Path $PWD 'nupkgs'
        $sbomDirectory = Join-Path $PWD 'sbom'

        New-Item -ItemType Directory -Force -Path $sbomDirectory | Out-Null

        $projectFiles = Get-ChildItem -Path $PWD -Recurse -Filter *.csproj |
          Where-Object {
            $_.FullName -match '[\\/]Trellis\.[^\\/]+[\\/](src|generator)[\\/][^\\/]+\.csproj$'
          }

        foreach ($project in $projectFiles) {
          $metadata = dotnet msbuild $project.FullName --getProperty:PackageId --getProperty:IsPackable | ConvertFrom-Json

          if ($metadata.Properties.IsPackable -ne 'true') {
            continue
          }

          $packageId = $metadata.Properties.PackageId
          $packageFile = Get-ChildItem -Path $packagesDirectory -Filter "$packageId.*.nupkg" |
            Where-Object { $_.Name -notlike '*.snupkg' }

          if ($packageFile.Count -ne 1) {
            throw "Expected exactly one package for $packageId but found $($packageFile.Count)."
          }

          $packageVersion = $packageFile[0].BaseName.Substring($packageId.Length + 1)
          $sbomFileName = "$packageId.$packageVersion.cdx.json"

          dotnet-CycloneDX $project.FullName `
            -o $sbomDirectory `
            -fn $sbomFileName `
            -F Json `
            -rs `
            -sn $packageId `
            -sv $packageVersion `
            -st Library
        }

        Write-Host 'Generated SBOMs:'
        Get-ChildItem -Path $sbomDirectory -Filter *.json |
          Select-Object Name, Length |
          Format-Table -AutoSize

    - name: List packages
      run: |
        echo "Packages to be published:"
        ls -lh nupkgs/*.nupkg

    - name: Upload SBOMs
      uses: actions/upload-artifact@v4
      with:
        name: sbom-cyclonedx
        path: sbom/*.json

    - name: Publish to NuGet
      if: ${{ inputs.dry_run == 'false' }}
      run: |
        dotnet nuget push nupkgs/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Dry run summary
      if: ${{ inputs.dry_run == 'true' }}
      run: |
        echo "DRY RUN - Packages NOT published:"
        ls -lh nupkgs/*.nupkg
        echo ""
        echo "To publish for real, re-run with dry_run = false"
